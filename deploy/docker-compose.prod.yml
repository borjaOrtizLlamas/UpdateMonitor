version: "3.9"

# ── Production compose ────────────────────────────────────────────────────────
# Uses real AWS S3. All secrets come from environment variables or a .env file.
# Run: docker compose -f deploy/docker-compose.prod.yml up -d

services:
  app:
    image: updatemonitor:latest   # or ghcr.io/yourorg/updatemonitor:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SERVER_ADMIN_KEY: "${SERVER_ADMIN_KEY}"

      # AWS credentials come from the host's IAM role / instance profile,
      # or you can set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY here.
      S3_BUCKET:  "${S3_BUCKET}"
      S3_REGION:  "${S3_REGION}"
      S3_PREFIX:  "updatemonitor/"

      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITLAB_TOKEN: "${GITLAB_TOKEN:-}"

      AI_API_KEY: "${AI_API_KEY}"
      AI_MODEL:   "${AI_MODEL:-claude-sonnet-4-6}"

      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"

      SMTP_HOST:     "${SMTP_HOST:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
