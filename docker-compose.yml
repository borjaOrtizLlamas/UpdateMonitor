# ── Development compose ───────────────────────────────────────────────────────
# Uses LocalStack as a local S3 replacement — no AWS account needed.
# Run: docker compose up
# Then open http://localhost:8080

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SERVER_ADMIN_KEY: "dev-secret"
      S3_BUCKET: "updatemonitor-dev"
      S3_REGION: "us-east-1"
      S3_ENDPOINT: "http://localstack:4566"
      # GitHub token (optional — increases rate limits)
      # GITHUB_TOKEN: ""
      # AI — set your key here or via .env file
      # AI_API_KEY: ""
      # Notifications (optional for dev)
      # SLACK_WEBHOOK_URL: ""
    depends_on:
      bucket-init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - ./web:/app/web:ro

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot container: waits for LocalStack to be healthy, then creates the bucket.
  bucket-init:
    image: amazon/aws-cli
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      aws --endpoint-url=http://localstack:4566
      s3 mb s3://updatemonitor-dev --region us-east-1

volumes:
  localstack-data:
